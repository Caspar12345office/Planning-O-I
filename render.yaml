services:
  - type: web
    name: oi-planning
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --threads 4 --timeout 60 app:app
    # Persistente schijf: zonder dit reset de database bij elke deploy.
    disk:
      name: oi-planning-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      # Genereer eenmalig een willekeurige waarde (Render: Generate).
      - key: SECRET_KEY
        generateValue: true
      # Eigen database op de persistente schijf.
      - key: PLANNING_OI_DB_PATH
        value: /var/data/planning_oi.db

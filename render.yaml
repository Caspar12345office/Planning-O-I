services:
  - type: web
    name: oi-planning
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 8 --timeout 60 --max-requests 1200 --max-requests-jitter 200
    # Persistente schijf: zonder dit reset de database bij elke deploy.
    disk:
      name: oi-planning-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      # Genereer eenmalig een willekeurige waarde (Render: Generate).
      - key: SECRET_KEY
        generateValue: true
      # Eigen database op de persistente schijf.
      - key: PLANNING_OI_DB_PATH
        value: /var/data/planning_oi.db
